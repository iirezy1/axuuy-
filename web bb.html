<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AXUUY | الواجهة النيونية التفاعلية</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Cairo:wght@300;400;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      cursor: none; /* إخفاء الماوس العادي لاستخدام الماوس المخصص */
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0a0a1a, #03030f);
      font-family: 'Cairo', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* خلفية نيون متحركة (خطوط ليزرية) */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        45deg,
        rgba(0, 255, 255, 0.03) 0px,
        rgba(0, 255, 255, 0.03) 2px,
        transparent 2px,
        transparent 8px
      );
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(circle, rgba(0, 255, 255, 0.08), transparent 70%);
      animation: rotateGlow 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes rotateGlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* مؤشر الماوس المخصص (أنميشن عند الحركة) */
    .custom-cursor {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(0, 255, 255, 0.6);
      box-shadow: 0 0 20px cyan, 0 0 40px rgba(0, 255, 255, 0.8);
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.08s ease-out;
      transform: translate(-50%, -50%);
      border: 2px solid white;
      backdrop-filter: blur(2px);
    }

    .cursor-dot {
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 10000;
      transition: 0.05s linear;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 8px cyan;
    }

    /* حاوية شفافة مع زجاج ونيون */
    .glass-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 500px;
      background: rgba(10, 10, 25, 0.45);
      backdrop-filter: blur(16px);
      border-radius: 48px;
      border: 1px solid rgba(0, 255, 255, 0.4);
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.2), 0 8px 32px rgba(0, 0, 0, 0.4);
      padding: 30px 25px 40px;
      transition: all 0.3s ease;
      animation: floatIn 1s ease-out;
    }

    @keyframes floatIn {
      0% {
        opacity: 0;
        transform: translateY(40px) scale(0.96);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* منطقة الصورة الشخصية (قابلة للتعديل والرفع) */
    .avatar-section {
      display: flex;
      justify-content: center;
      margin-bottom: 25px;
      position: relative;
    }

    .avatar-wrapper {
      position: relative;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: linear-gradient(135deg, cyan, magenta);
      padding: 4px;
      box-shadow: 0 0 25px cyan, 0 0 15px magenta;
      transition: 0.3s;
      cursor: pointer;
    }

    .avatar-wrapper:hover {
      transform: scale(1.02);
      box-shadow: 0 0 40px cyan, 0 0 25px magenta;
    }

    #profileImage {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid #fff;
      background: #111;
    }

    .upload-icon {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
      border-radius: 30px;
      padding: 8px 10px;
      font-size: 14px;
      color: cyan;
      border: 1px solid cyan;
      cursor: pointer;
      transition: 0.2s;
      font-weight: bold;
    }

    .upload-icon:hover {
      background: cyan;
      color: black;
      box-shadow: 0 0 15px cyan;
    }

    #imageUploadInput {
      display: none;
    }

    h1 {
      font-family: 'Orbitron', monospace;
      font-size: 2.5rem;
      text-align: center;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #fff, cyan, #ff66ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 10px rgba(0,255,255,0.5);
      margin-bottom: 10px;
    }

    .sub {
      text-align: center;
      font-size: 0.9rem;
      margin-bottom: 30px;
      color: #bbf0ff;
      letter-spacing: 1px;
      border-bottom: 1px dashed rgba(0,255,255,0.4);
      display: inline-block;
      width: auto;
      margin-left: auto;
      margin-right: auto;
      padding-bottom: 8px;
    }

    /* الروابط بنمط نيون شفاف */
    .links-grid {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin: 30px 0 20px;
    }

    .neon-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 16px 12px;
      text-decoration: none;
      font-weight: 800;
      font-size: 1.2rem;
      font-family: 'Cairo', sans-serif;
      border-radius: 60px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 255, 255, 0.7);
      color: white;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 8px rgba(0, 255, 255, 0.3);
    }

    /* تأثير النيون الخاص لكل رابط (ألوان مميزة) */
    .neon-link i {
      font-size: 1.7rem;
      transition: 0.2s;
    }

    .neon-link:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 0 22px currentColor;
      border-color: currentColor;
      background: rgba(0, 0, 0, 0.7);
    }

    /* ألوان النيون الفردية */
    .link-instagram:hover { color: #ff2e63; text-shadow: 0 0 5px #ff2e63; border-color: #ff2e63; box-shadow: 0 0 20px #ff2e63; }
    .link-tiktok:hover { color: #00f2fe; text-shadow: 0 0 5px #00f2fe; border-color: #00f2fe; }
    .link-facebook:hover { color: #1877F2; text-shadow: 0 0 5px #1877F2; border-color: #1877F2; }
    .link-youtube:hover { color: #ff0000; text-shadow: 0 0 5px #ff0000; border-color: #ff0000; }
    .link-whatsapp:hover { color: #25D366; text-shadow: 0 0 5px #25D366; border-color: #25D366; }
    .link-x:hover { color: #ffffff; text-shadow: 0 0 5px #aaa; border-color: #fff; }
    .link-discord:hover { color: #5865F2; text-shadow: 0 0 5px #5865F2; border-color: #5865F2; }
    .link-telegram:hover { color: #0088cc; text-shadow: 0 0 5px #0088cc; border-color: #0088cc; }

    footer {
      text-align: center;
      margin-top: 30px;
      font-size: 0.75rem;
      font-family: 'Orbitron', monospace;
      color: #8aaec0;
      opacity: 0.8;
    }

    /* أنيميشن عند فتح الرابط (تأثير portal) */
    .portal-animation {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, cyan, magenta, transparent);
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      pointer-events: none;
      z-index: 99999;
      transition: 0s;
      box-shadow: 0 0 80px cyan;
    }

    .portal-active {
      animation: portalBurst 0.55s ease-out forwards;
    }

    @keyframes portalBurst {
      0% {
        transform: translate(-50%, -50%) scale(0);
        opacity: 1;
      }
      50% {
        transform: translate(-50%, -50%) scale(8);
        opacity: 0.9;
      }
      100% {
        transform: translate(-50%, -50%) scale(15);
        opacity: 0;
      }
    }

    /* تأثيرات إضافية عند hover الماوس على الروابط */
    .neon-link {
      position: relative;
      z-index: 2;
    }
  </style>
</head>
<body>

  <!-- عناصر الماوس المخصصة -->
  <div class="custom-cursor"></div>
  <div class="cursor-dot"></div>

  <div class="glass-card">
    <!-- صورة شخصية قابلة للرفع -->
    <div class="avatar-section">
      <div class="avatar-wrapper" id="avatarWrapper">
        <img id="profileImage" src="https://ui-avatars.com/api/?background=0D8F81&color=fff&rounded=true&bold=true&size=130&fontsize=60&name=AXUUY" alt="Profile">
        <div class="upload-icon" id="uploadBtn">
          <i class="fas fa-camera"></i>
        </div>
      </div>
      <input type="file" id="imageUploadInput" accept="image/*">
    </div>

    <h1>AXUUY</h1>
    <div style="text-align: center;">
      <div class="sub">✦ NEON GATE | الروابط الرسمية ✦</div>
    </div>

    <div class="links-grid">
      <!-- كل الروابط مع نفس الروابط التي أرسلتها -->
      <a href="https://instagram.com/zx6sq" target="_blank" class="neon-link link-instagram" data-url="https://instagram.com/zx6sq">
        <i class="fab fa-instagram"></i> Instagram Private
      </a>
     
           
      </a>
      <a href="https://www.tiktok.com/@zx6sq" target="_blank" class="neon-link link-tiktok" data-url="https://www.tiktok.com/@zx6sq">
        <i class="fab fa-tiktok"></i> TikTok
      </a>
      <a href="https://www.youtube.com/@AXUUY" target="_blank" class="neon-link link-youtube" data-url="https://www.youtube.com/@AXUUY">
        <i class="fab fa-youtube"></i> YouTube
      </a>


      <!-- رابط Xbox الجديد حسب طلبك -->
         <a href="https://account.xbox.com/ar-SA/Profile?gamertag=axuuy" target="_blank" class="neon-link link-xbox">
        <i class="fab fa-xbox"></i> Xbox | AXUUY
     
    
      </a>
      <a href="https://x.com/lS4BrI3C3I99362" target="_blank" class="neon-link link-x" data-url="https://x.com/lS4BrI3C3I99362">
        <i class="fab fa-twitter"></i> Private Account (X)
      </a>
      <a href="https://discord.gg/ZTkuEPEQAU" target="_blank" class="neon-link link-discord" data-url="https://discord.gg/ZTkuEPEQAU">
        <i class="fab fa-discord"></i> Discord
      </a>
      
    </div>
    <footer>
      <i class="fas fa-bolt"></i> NEON INTERFACE • جميع الروابط رسمية <i class="fas fa-music"></i>
    </footer>
  </div>

  <!-- عنصر الأنميشن عند الفتح -->
  <div id="portalEffect" class="portal-animation"></div>

  <script>
    (function() {
      // ------------------- 1. الماوس المخصص مع أنيميشن رهيب -------------------
      const cursor = document.querySelector('.custom-cursor');
      const cursorDot = document.querySelector('.cursor-dot');

      if (cursor && cursorDot) {
        document.addEventListener('mousemove', (e) => {
          cursor.style.left = e.clientX + 'px';
          cursor.style.top = e.clientY + 'px';
          cursorDot.style.left = e.clientX + 'px';
          cursorDot.style.top = e.clientY + 'px';
        });

        // تأثير إضافي: تكبير المؤشر عند المرور فوق الروابط
        const allLinks = document.querySelectorAll('.neon-link');
        allLinks.forEach(link => {
          link.addEventListener('mouseenter', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(1.6)';
            cursor.style.background = 'rgba(255, 0, 255, 0.8)';
            cursor.style.boxShadow = '0 0 30px fuchsia';
          });
          link.addEventListener('mouseleave', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(1)';
            cursor.style.background = 'rgba(0, 255, 255, 0.6)';
            cursor.style.boxShadow = '0 0 20px cyan';
          });
        });
      }

      // ------------------- 2. رفع الصورة الشخصية -------------------
      const uploadBtn = document.getElementById('uploadBtn');
      const imageUpload = document.getElementById('imageUploadInput');
      const profileImg = document.getElementById('profileImage');

      uploadBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        imageUpload.click();
      });

      imageUpload.addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function(e) {
            profileImg.src = e.target.result;
            // تخزين الصورة في localStorage إذا أردت بقاء الصورة بعد التحديث (اختياري)
            localStorage.setItem('userProfileImage', e.target.result);
          };
          reader.readAsDataURL(file);
        }
      });

      // استعادة الصورة المخزنة مسبقاً
      const savedImage = localStorage.getItem('userProfileImage');
      if (savedImage) {
        profileImg.src = savedImage;
      }

      // ------------------- 3. أنيميشن رهيب عند فتح الرابط (بوابة نيون) -------------------
      const portalDiv = document.getElementById('portalEffect');
      
      // اعتراض جميع الروابط لإضافة الأنميشن قبل فتح الرابط
      const allNeonLinks = document.querySelectorAll('.neon-link');
      
      allNeonLinks.forEach(link => {
        link.addEventListener('click', function(event) {
          // منع الفتح الفوري لعرض الأنيميشن
          event.preventDefault();
          const targetUrl = this.getAttribute('href');
          
          // إظهار تأثير البوابة النيونية في موقع الماوس الحالي
          if (portalDiv) {
            // نأخذ موقع الماوس الحالي ليكون مركز الأنميشن
            let mouseX = 0, mouseY = 0;
            document.addEventListener('mousemove', function getCoords(e) {
              mouseX = e.clientX;
              mouseY = e.clientY;
              document.removeEventListener('mousemove', getCoords);
            });
            // تأخير بسيط لالتقاط آخر موقع معروف (أو استخدام موقع المؤخر)
            setTimeout(() => {
              if (mouseX !== 0 || mouseY !== 0) {
                portalDiv.style.left = mouseX + 'px';
                portalDiv.style.top = mouseY + 'px';
              } else {
                // fallback center
                portalDiv.style.left = window.innerWidth/2 + 'px';
                portalDiv.style.top = window.innerHeight/2 + 'px';
              }
              portalDiv.classList.remove('portal-active');
              void portalDiv.offsetWidth; // force reflow
              portalDiv.classList.add('portal-active');
            }, 5);
          }
          
          // إضافة تأثير صوتي اختياري (نغم بسيط بدون ملفات خارجية - يمكن استخدام web audio)
          // ولكن الأفضل عمل pulsation مرئي وانتقال للرابط بعد الأنميشن
          setTimeout(() => {
            // فتح الرابط في تبويب جديد بعد الأنيميشن الرائع
            window.open(targetUrl, '_blank');
          }, 480); // يتزامن مع مدة الأنيميشن 0.55 ثانية
        });
      });

      // إضافة تأثيرات نيون اضافية عائمة في الخلفية
      function createNeonParticles() {
        const body = document.body;
        for (let i = 0; i < 35; i++) {
          let particle = document.createElement('div');
          particle.style.position = 'fixed';
          particle.style.width = '3px';
          particle.style.height = '3px';
          particle.style.background = `hsl(${Math.random() * 360}, 100%, 65%)`;
          particle.style.borderRadius = '50%';
          particle.style.bottom = Math.random() * 100 + 'vh';
          particle.style.left = Math.random() * 100 + 'vw';
          particle.style.opacity = Math.random() * 0.5 + 0.2;
          particle.style.boxShadow = '0 0 6px currentColor';
          particle.style.pointerEvents = 'none';
          particle.style.zIndex = '1';
          particle.style.animation = `floatParticle ${Math.random() * 12 + 5}s linear infinite`;
          particle.style.animationDelay = Math.random() * 10 + 's';
          body.appendChild(particle);
        }
        const styleSheet = document.createElement("style");
        styleSheet.textContent = `
          @keyframes floatParticle {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.2; }
            50% { opacity: 0.9; transform: translateY(-60px) rotate(180deg);}
            100% { transform: translateY(-150px) rotate(360deg); opacity: 0; }
          }
        `;
        document.head.appendChild(styleSheet);
      }
      createNeonParticles();

      // إضافة تأثير متابعة للماوس على الخلفية مع تغير لوني سريع (اختياري)
      const glassCard = document.querySelector('.glass-card');
      document.addEventListener('mousemove', (e) => {
        const x = e.clientX / window.innerWidth;
        const y = e.clientY / window.innerHeight;
        if (glassCard) {
          glassCard.style.transition = 'box-shadow 0.1s';
          glassCard.style.boxShadow = `0 0 40px rgba(0, 255, 255, ${0.2 + x * 0.2}), 0 0 20px rgba(255, 0, 255, ${0.1 + y * 0.2})`;
        }
      });

      // إضافة تأثير تغيير لون الكارد على hover للروابط بشكل مميز
      const linksForBg = document.querySelectorAll('.neon-link');
      linksForBg.forEach(link => {
        link.addEventListener('mouseenter', (e) => {
          const color = window.getComputedStyle(link).borderColor;
          if (glassCard) {
            glassCard.style.borderColor = color;
            glassCard.style.transition = '0.2s';
          }
        });
        link.addEventListener('mouseleave', () => {
          if (glassCard) {
            glassCard.style.borderColor = 'rgba(0, 255, 255, 0.4)';
          }
        });
      });

      // منع ظهور الماوس الافتراضي فوق كل العناصر
      const allElements = document.querySelectorAll('*');
      allElements.forEach(el => {
        el.style.cursor = 'none';
      });
      
      // إضافة أنيميشن للصفحة عند التحميل
      window.addEventListener('load', () => {
        const mainCard = document.querySelector('.glass-card');
        mainCard.style.animation = 'floatIn 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1)';
      });

      // تحسين الأداء لملف الصورة الاحتياطي 
      // إذا أراد المستخدم إعادة تعيين الصورة الافتراضية يمكنه الضغط مرتين (اختياري لكننا نضيف مميزات)
      profileImg.addEventListener('dblclick', () => {
        if (confirm('هل تريد استعادة الصورة الافتراضية؟')) {
          profileImg.src = 'https://ui-avatars.com/api/?background=0D8F81&color=fff&rounded=true&bold=true&size=130&fontsize=60&name=AXUUY';
          localStorage.removeItem('userProfileImage');
        }
      });

      // إضافة تأثيرات عائمة إضافية (أشعة تحت الروابط)
      const linkItems = document.querySelectorAll('.neon-link');
      linkItems.forEach(item => {
        item.addEventListener('mousemove', (e) => {
          const rect = item.getBoundingClientRect();
          const xPos = e.clientX - rect.left;
          const yPos = e.clientY - rect.top;
          item.style.setProperty('--x', xPos + 'px');
          item.style.setProperty('--y', yPos + 'px');
        });
      });
      // إضافة shimmer مؤقت اختياري: نيون خافت
      const styleShine = document.createElement('style');
      styleShine.textContent = `
        .neon-link::after {
          content: '';
          position: absolute;
          top: var(--y, 50%);
          left: var(--x, 50%);
          width: 0px;
          height: 0px;
          background: radial-gradient(circle, rgba(255,255,255,0.7), transparent);
          border-radius: 50%;
          transform: translate(-50%, -50%);
          transition: width 0.2s, height 0.2s;
          pointer-events: none;
        }
        .neon-link:hover::after {
          width: 120px;
          height: 120px;
          opacity: 0.4;
        }
      `;
      document.head.appendChild(styleShine);
    })();
  </script>
</body>
</html>
